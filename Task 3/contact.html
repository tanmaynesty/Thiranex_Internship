<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanmay Chaudhari | Contact</title>
    <meta name="description" content="Get in touch with Tanmay Chaudhari for front-end development, accessibility auditing, and web performance optimization.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header role="banner">
        </a>
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content" role="main">
        
        <section aria-labelledby="contact-heading">
            <h1 id="contact-heading">Contact Me</h1>
            <p>Please fill out the form below, and I will get back to you within 24 hours.</p>

            <form action="/submit-endpoint" method="POST" aria-labelledby="contact-heading">
                
                <fieldset>
                    <legend>Personal Information</legend>
                    
                    <div>
                        <label for="user-name">Full Name (Required)</label>
                        <input type="text" id="user-name" name="name" required aria-required="true" autocomplete="name">
                    </div>

                    <div>
                        <label for="user-email">Email Address (Required)</label>
                        <input type="email" id="user-email" name="email" required aria-required="true" autocomplete="email">
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Message Details</legend>
                    
                    <div>
                        <label for="user-message">Your Message (Required)</label>
                        <textarea id="user-message" name="message" rows="5" required aria-required="true"></textarea>
                    </div>
                </fieldset>

                <button type="submit">Send Message</button>
            </form>
        </section>

    </main>

    <footer role="contentinfo">
    </footer>

</body>
</html>
